<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume - Jesse Blankenship</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, Arial, sans-serif;
    background:#08162B;
    color:white;
    overflow-x:hidden;
}

.page{
    position:relative;
    z-index:2;
    padding:80px 10%;
}

.header{
    text-align:center;
    margin-bottom:50px;
}

.header h1{
    font-size:4rem;
    margin-bottom:15px;
}

.header p{
    max-width:900px;
    margin:auto;
    color:#D8D8D8;
    line-height:1.8;
    font-size:1.05rem;
}

.resume-container{
    width:100%;
    max-width:1100px;
    margin:0 auto 40px auto;
    border-radius:18px;
    overflow:hidden;
    background:white;
    box-shadow:0 0 35px rgba(0,0,0,.35);
}

.resume-container embed{
    width:100%;
    height:1000px;
    border:none;
}

.button-wrap{
    text-align:center;
    margin-bottom:40px;
}

.resume-btn{
    display:inline-block;
    text-decoration:none;
    color:white;
    padding:14px 28px;
    border-radius:10px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    transition:.2s ease;
}

.resume-btn:hover{
    background:rgba(255,255,255,.14);
}

.back-wrap{
    text-align:center;
    margin-top:30px;
}

.back-btn{
    display:inline-block;
    text-decoration:none;
    color:rgba(255,255,255,.8);
    padding:12px 22px;
    border-radius:10px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1);
    transition:.2s ease;
}

.back-btn:hover{
    color:white;
    background:rgba(255,255,255,.12);
}

/* PARTICLES */

.particle{
    position:fixed;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:.12;
    animation:float linear infinite;
    z-index:1;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }

    to{
        transform:translateY(-100vh);
    }
}

@media(max-width:900px){

    .page{
        padding:60px 6%;
    }

    .header h1{
        font-size:2.8rem;
    }

    .resume-container embed{
        height:700px;
    }
}
</style>
</head>

<body>

<div class="page">

    <div class="header">

        <h1>Resume</h1>

        <p>
            My experience includes military service in the U.S. Navy, technical support through
            Geek Squad, contractor experience supporting shipbuilding operations, and ongoing
            Information Technology studies at the University of Cincinnati with a cybersecurity focus.
        </p>

    </div>

    <div class="resume-container">

        <embed
            src="IMAGES/Resume2026.pdf"
            type="application/pdf">

    </div>

    <div class="button-wrap">

        <a href="IMAGES/Resume2026.pdf"
           download
           class="resume-btn">
            Download Resume
        </a>

    </div>
        <div class="back-wrap">

        <a href="index.html" class="back-btn">
            ← Back to Home
        </a>

    </div>

</div>

<script>

for(let i = 0; i < 50; i++){

    let particle = document.createElement("div");

    particle.classList.add("particle");

    particle.style.left =
        Math.random() * 100 + "vw";

    particle.style.animationDuration =
        (12 + Math.random() * 20) + "s";

    particle.style.opacity =
        Math.random() * 0.18;

    document.body.appendChild(particle);
}

</script>

</body>
</html>
